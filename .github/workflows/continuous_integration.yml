name: Continuous Integration
on:
  push:
    branches:
      - main
      - actions-*
    tags:
      - v*
  pull_request:
    branches-ignore:
      - actions-*
  workflow_dispatch:

jobs:
  specs:
    name: Run specs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "ruby"
            standardrb: true
          - ruby: "4.0"
            appraisal: "activerecord_8.1"
          - ruby: "3.4"
            appraisal: "activerecord_8.0"
          - ruby: "3.3"
            appraisal: "activerecord_7.2"
          - ruby: "3.2"
            appraisal: "activerecord_7.1"
          - ruby: "3.2"
            appraisal: "activerecord_7.0"
          - ruby: "3.1"
            appraisal: "activerecord_6.1"
          - ruby: "3.1"
            appraisal: "activerecord_6.0"
          - ruby: "ruby"
            appraisal: "without_sidekiq"
          - ruby: "4.0"
            appraisal: "sidekiq_8"
          - ruby: "3.4"
            appraisal: "sidekiq_7"
          - ruby: "3.1"
            appraisal: "sidekiq_6"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Ruby CI
        uses: bdurand/github-actions/ruby-ci@v1.0.1
        with:
          ruby: ${{ matrix.ruby }}
          appraisal: ${{ matrix.appraisal }}
          bundler: ${{ matrix.bundler }}
          standardrb: ${{ matrix.standardrb }}
          yard: ${{ matrix.yard }}
